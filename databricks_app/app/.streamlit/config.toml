[theme]
base = "light"
primaryColor = "#FF3621"
backgroundColor = "#F4F1EA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0E2A30"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = true

[runner]
# We render everything through explicit st.* calls. Disabling magic prevents
# bare expressions (e.g. list comprehensions) from being auto-displayed and crashing.
magicEnabled = false
